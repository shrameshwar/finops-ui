steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build','-t','gcr.io/$PROJECT_ID/finops-ui','.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push','gcr.io/$PROJECT_ID/finops-ui']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      [
        'run','deploy','finops-ui',
        '--image','gcr.io/$PROJECT_ID/finops-ui',
        '--region','asia-south1',
        '--platform','managed',
        '--allow-unauthenticated'
      ]